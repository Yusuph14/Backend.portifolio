<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📊 Projects Admin Dashboard</h1>

        <!-- ADD PROJECT FORM -->
        <div class="form">
            <input id="title" placeholder="Project Title">
            <input id="description" placeholder="Description">
            <input id="tools" placeholder="Tools (comma separated)">
            <button onclick="addProject()">➕ Add Project</button>
        </div>

        <h2>All Projects</h2>
        <div id="projects" class="grid"></div>

    </div>

    <script src="app.js"></script>
</body>

</html>
